<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container text-center">
        <h1 class="container text-center" mt-2> To DO List</h1>
        <div class="container text-center">
            <input placeholder="Enter To DO for add" class="form-control" id="id">
            <button type="button" class="btn btn-primary mt-2" onclick="addtodo()">Add ToDo</button>
            
        </div>
        <br>
        <div class="list-group"  id="result"></div>
        <br>
        <button class="btn btn-danger" onclick="clear_todo()">clear ToDo</button>
    </div>

    <script src="app.js"></script>
    
</body>
</html>
